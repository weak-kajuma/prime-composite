<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>素数大富豪判定ツール</title>
    <meta name="apple-mobile-web-app-title" content="素数大富豪判定ツール" />
    <meta property="og:title" content="素数大富豪判定ツール" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="app" aria-label="素数判定アプリ">
      <section class="display" aria-live="polite">
        <p class="display__label">入力中の数字</p>
        <p id="inputValue" class="display__input">&nbsp;</p>
        <p id="judgeResult" class="display__result">
          <span id="judgeText">判定結果: ー</span>
        </p>
      </section>

      <section class="keys" aria-label="キー領域"></section>
    </main>

    <div id="specialOverlay" class="special-overlay" aria-hidden="true">
      <canvas id="specialCanvas" class="special-overlay__canvas"></canvas>
      <div class="special-overlay__glow"></div>
      <div id="specialRippleLayer" class="special-overlay__ripples"></div>
      <div class="special-overlay__content">
        <p class="special-overlay__tag">SPECIAL JUDGEMENT</p>
        <h2 id="specialTitle" class="special-overlay__title"></h2>
      </div>
    </div>
  </body>
</html>
